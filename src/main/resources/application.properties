spring.application.name=moneytracker

# DATABASE (PostgreSQL - Render)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# SERVER
server.port=${PORT:8080}
server.servlet.context-path=/api/

# EMAIL
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_LOGIN}
spring.mail.password=${SMTP_KEY}
app.mail.from=${T_EMAIL}

spring.jpa.open-in-view=false

# FRONTEND
money.manager.frontend.url=${FRONTEND_URL}
backendapp.activation.url=${BACKEND_URL}

jwt.secret=${JWT_SECRET}
backendapp.activation.url=${Money-manger-backendaccountactivationurl}

#spring.profiles.active=prod
